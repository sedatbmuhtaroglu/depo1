version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qrmenu-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://admin:CataL_2026_pG_Secure!@db:5432/qrmenu?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"

  db:
    image: postgres:15
    container_name: qrmenu-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qrmenu
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: CataL_2026_pG_Secure!
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qrmenu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
