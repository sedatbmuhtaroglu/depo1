version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: qrmenu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qrmenu
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
